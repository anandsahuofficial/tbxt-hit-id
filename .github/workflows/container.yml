name: Build & push container to GHCR

# Builds the all-batteries-included CUDA image defined in
# setup/Containerfile and pushes it to the GitHub Container Registry
# at ghcr.io/<owner>/<repo> on every push to main + on every tag.
#
# Image typically lands at 6-12 GB (CUDA 12.8 runtime + cuDNN +
# torch + conda env + GNINA + src/). First build takes ~25 min; later
# rebuilds are cached layer-by-layer and finish in 3-8 min when only
# src/ changes.
#
# Apptainer / Singularity users can pull the same image via
#   apptainer pull oras://ghcr.io/<owner>/<repo>:latest
# or
#   apptainer pull docker://ghcr.io/<owner>/<repo>:latest

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'setup/Containerfile'
      - 'environment.yml'
      - 'src/**'
      - 'tools/**'
      - 'examples/**'
      - '.github/workflows/container.yml'
  workflow_dispatch:

# Only one build at a time per ref; cancel superseded builds
concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # required to push to ghcr.io
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags / labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short,prefix=sha-
          labels: |
            org.opencontainers.image.title=tbxt-hit-id
            org.opencontainers.image.description=Multi-signal computational pipeline for TBXT G177D
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: setup/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false  # keep manifest single-arch friendly for apptainer

      - name: Image summary
        run: |
          echo "## Built ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "Tags:" >> $GITHUB_STEP_SUMMARY
          echo '```'  >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```'  >> $GITHUB_STEP_SUMMARY
          echo "Pull (Apptainer):" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "apptainer pull oras://ghcr.io/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
